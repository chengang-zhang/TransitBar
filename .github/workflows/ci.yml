name: CI

on:
  pull_request:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  PROJECT: TransitBar.xcodeproj
  SCHEME: TransitBar
  APP_NAME: TransitBar

jobs:
  build-and-test:
    name: Build and Test
    if: github.event_name == 'pull_request'
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set build paths
        run: echo "DERIVED_DATA=$RUNNER_TEMP/DerivedData" >> "$GITHUB_ENV"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List project schemes
        run: xcodebuild -list -project "$PROJECT"

      - name: Build Debug app
        run: |
          set -euo pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:TransitBarTests \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO

  release:
    name: Build Release DMG
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set build paths
        run: echo "DERIVED_DATA=$RUNNER_TEMP/DerivedData" >> "$GITHUB_ENV"

      - name: Set release version
        run: |
          set -euo pipefail
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Release app
        run: |
          set -euo pipefail

          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="$RELEASE_VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER"

          APP_PATH="$DERIVED_DATA/Build/Products/Release/$APP_NAME.app"
          test -d "$APP_PATH"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Package DMG
        run: |
          set -euo pipefail
          STAGING_DIR="$RUNNER_TEMP/dmg"
          DMG_PATH="$RUNNER_TEMP/$APP_NAME-${GITHUB_REF_NAME}.dmg"

          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"
          cp -R "$APP_PATH" "$STAGING_DIR/"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Upload DMG to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$DMG_PATH" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$DMG_PATH" \
              --title "$GITHUB_REF_NAME" \
              --notes "TransitBar $GITHUB_REF_NAME"
          fi
